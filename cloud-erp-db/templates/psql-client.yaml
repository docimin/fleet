{{- if .Values.psqlClient.enabled }}
# Long-lived psql shell wired to the cluster's superuser secret. Use it
# to run ad-hoc SQL or pipe a script file into the database:
#   kubectl -n {{ .Release.Namespace }} exec -it deploy/{{ .Values.cluster.name }}-client -- psql
#   kubectl -n {{ .Release.Namespace }} exec -i  deploy/{{ .Values.cluster.name }}-client -- psql < script.sql
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.cluster.name }}-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.cluster.name }}-client
  template:
    metadata:
      labels:
        app: {{ .Values.cluster.name }}-client
    spec:
      containers:
        - name: psql
          image: {{ .Values.cluster.image }}
          command: ["sleep", "infinity"]
          env:
            - name: PGHOST
              value: {{ .Values.cluster.name }}-rw.{{ .Release.Namespace }}.svc
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: {{ .Values.cluster.database }}
            {{- /* superuser secret only exists when enableSuperuserAccess is true;
                   otherwise fall back to the app-role secret CNPG always creates. */}}
            {{- $secret := printf "%s-%s" .Values.cluster.name (ternary "superuser" "app" .Values.cluster.enableSuperuserAccess) }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: password
          resources:
            limits:
              cpu: "200m"
              memory: 128Mi
            requests:
              cpu: "10m"
              memory: 32Mi
{{- end }}
