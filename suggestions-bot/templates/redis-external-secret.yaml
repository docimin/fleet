{{- if and .Values.redis.enabled .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.name }}-redis
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecret.store | default "vault" }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.name }}-redis
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.externalSecret.vaultPath | default .Values.name }}/redis
{{- end }}
