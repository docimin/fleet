replicaCount: 1

name: headpat-place-api

image:
  repository: harbor.fayevr.dev/fleet/headpat-place-api
  tag: "0.1.1"
  pullPolicy: Always

redis:
  enabled: true
  image: redis:7-alpine

migrate:
  enabled: true
  tag: "0.1.1-migrate"
  backoffLimit: 3

postgres:
  enabled: true
  name: headpat-place-pg
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie
  database: headpat
  owner: headpat
  storage:
    size: 10Gi
    storageClass: ceph-rbd-kubernetes

service:
  type: ClusterIP
  port: 80
  targetPort: 8787

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.headpat.place
      paths:
        - path: "/"
          pathType: Prefix
  tls:
    - hosts:
        - api.headpat.place
      secretName: headpat-place-api-tls-secret

externalSecret:
  enabled: true
  refreshInterval: "5m"
  storeRef:
    kind: ClusterSecretStore
    name: vault-headpat
  remoteRef:
    key: headpat-place/api-env
  targetSecretName: headpat-place-api-env

secrets:
  name: headpat-place-api-env
  imagePullSecrets:
    - name: harbor-secret

resources:
  limits:
    memory: "1Gi"
    cpu: "1000m"
  requests:
    memory: "256Mi"
    cpu: "100m"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8787"

probes:
  liveness:
    path: "/health"
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5
    successThreshold: 1
  readiness:
    path: "/health"
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

cronjobs:
  # Sweeps orphaned storage objects: files uploaded to S3 but never linked to a
  # row (broken/abandoned uploads), across all media kinds. The 24h grace period
  # protects in-flight uploads; only objects orphaned longer than that are removed.
  - name: orphan-sweep
    enabled: true
    schedule: "0 3 * * *"
    command: ["bun", "run", "scripts/sweep-orphans.ts"]
    args:
      - "--max-age-hours=24"
  # Notifies attendees who opted in to a reminder for events starting soon.
  - name: event-reminders
    enabled: true
    schedule: "*/15 * * * *"
    command: ["bun", "run", "scripts/send-event-reminders.ts"]
    args:
      - "--within-hours=24"

autoscaling:
  enabled: false

pdb:
  enabled: false

serviceAccount:
  name: headpat-place-api
