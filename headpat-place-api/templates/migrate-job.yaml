{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.name }}-migrate
  annotations:
    # Runs before each upgrade rolls out, so schema changes land before the new
    # app pods start. (Initial schema is seeded separately; the DB already exists
    # by upgrade time.)
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: {{ .Values.name }}-migrate
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      imagePullSecrets:
        {{- range .Values.secrets.imagePullSecrets }}
        - name: {{ .name }}
        {{- end }}
      containers:
        - name: migrate
          image: {{ .Values.image.repository }}:{{ .Values.migrate.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bun", "run", "db:migrate"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.name }}-app
                  key: uri
{{- end }}
