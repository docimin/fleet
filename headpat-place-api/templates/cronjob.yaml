{{- range .Values.cronjobs }}
{{- if .enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $.Values.name }}-{{ .name }}
spec:
  schedule: {{ .schedule | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: {{ $.Values.name }}
            job: {{ .name }}
        spec:
          serviceAccountName: {{ $.Values.serviceAccount.name }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
          restartPolicy: Never
          containers:
            - name: {{ $.Values.name }}-{{ .name }}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              image: {{ $.Values.image.repository }}:{{ $.Values.image.tag }}
              imagePullPolicy: {{ $.Values.image.pullPolicy }}
              command: {{ toJson .command }}
              {{- with .args }}
              args:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              env:
                {{- if $.Values.postgres.enabled }}
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ $.Values.postgres.name }}-app
                      key: uri
                {{- end }}
                {{- if $.Values.redis.enabled }}
                - name: REDIS_URL
                  value: "redis://{{ $.Values.name }}-redis:6379"
                {{- end }}
              envFrom:
                - secretRef:
                    name: {{ if $.Values.externalSecret.enabled }}{{ $.Values.externalSecret.targetSecretName }}{{ else }}{{ $.Values.secrets.name }}{{ end }}
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "50m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
          volumes:
            - name: tmp
              emptyDir: {}
          imagePullSecrets:
            {{- range $.Values.secrets.imagePullSecrets }}
            - name: {{ .name }}
            {{- end }}
{{- end }}
{{- end }}
