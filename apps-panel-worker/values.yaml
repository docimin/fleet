# apps-panel-worker — single-replica background worker for cron jobs + status
# checker. Dedicated image built from backend/Dockerfile.worker. NEVER scale
# beyond replicaCount: 1 without first moving jobs into a queue (pg-boss /
# BullMQ) — every replica would otherwise run every cron loop independently.
replicaCount: 1

name: apps-panel-worker

image:
  repository: harbor.fayevr.dev/fleet/apps-panel-worker
  tag: "0.3.16"
  pullPolicy: Always

# Reuse the backend's env secret — the worker needs the same DATABASE_URL,
# Stripe keys, Proxmox creds, etc. as the backend.
externalSecret:
  enabled: true
  refreshInterval: "5m"
  storeRef:
    kind: ClusterSecretStore
    name: vault-apps-panel
  remoteRef:
    key: apps-panel/backend-env
  targetSecretName: apps-panel-worker-env

secrets:
  name: apps-panel-worker-env
  imagePullSecrets:
    - name: harbor-secret

resources:
  limits:
    memory: "1Gi"
    cpu: "1000m"
  requests:
    memory: "256Mi"
    cpu: "100m"

podAnnotations: {}

# Inline env (feature flags, log levels — non-secret). Set/remove individual
# keys here; rendered as `env:` on the container alongside `envFrom: secretRef`.
# Currently enabling the metered-storage worker in DRY-RUN mode for validation —
# auto-expand decisions and meter events are LOGGED but not actually sent until
# STORAGE_METER_DRYRUN is removed.
env:
  STORAGE_WORKER_ENABLED: "1"
  STORAGE_METER_DRYRUN: "1"
  LOG_LEVEL: "info"

# Reuse the SA created by the apps-panel-backend chart in the same namespace.
# That SA has the narrow apps-panel-cluster + apps-panel-tenant bindings the
# worker also needs (provision retries, bandwidth checks all hit the k8s API).
serviceAccount:
  name: apps-panel
