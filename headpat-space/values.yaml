replicaCount: 1

name: headpat-space

image:
  repository: harbor.fayevr.dev/fleet/headpat-space
  tag: "0.3.0"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: headpat.space
      paths:
        - path: "/"
          pathType: Prefix
    - host: www.headpat.space
      paths:
        - path: "/"
          pathType: Prefix
  tls:
    - hosts:
        - headpat.space
        - www.headpat.space
      secretName: headpat-space-tls-secret

secrets:
  name: headpat-space-variables
  imagePullSecrets:
    - name: harbor-secret

resources:
  limits:
    memory: "512Mi"
    cpu: "500m"
  requests:
    memory: "256Mi"
    cpu: "256m"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"

probes:
  liveness:
    path: "/"
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  readiness:
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: false
  minAvailable: 1

externalSecret:
  enabled: true
  store: vault
  vaultPath: headpat-space
  refreshInterval: 1h
