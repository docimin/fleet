replicaCount: 1

name: cloud-erp-backend

image:
  repository: harbor.fayevr.dev/fleet/cloud-erp-backend
  tag: "0.0.8"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8787

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.cloud-erp.dev
      paths:
        - path: "/"
          pathType: Prefix
  tls:
    - hosts:
        - api.cloud-erp.dev
      secretName: cloud-erp-backend-tls-secret

# External Secrets Operator pulls the backend's runtime env
# (CONTROL_DATABASE_URL, DATABASE_URL, REDIS_URL, BETTER_AUTH_SECRET,
# PLATFORM_AUTH_SECRET, CONTROL_DB_ENCRYPTION_KEY, etc.) from the
# configured store and materialises it as a regular Secret that the
# Deployment mounts via envFrom.
externalSecret:
  enabled: true
  refreshInterval: "5m"
  storeRef:
    kind: ClusterSecretStore
    name: vault-cloud-erp
  remoteRef:
    key: vault-cloud-erp/backend
  targetSecretName: cloud-erp-backend

# Used when externalSecret.enabled is false — provide a Secret you've
# already created and reference it here.
secrets:
  name: cloud-erp-backend
  imagePullSecrets:
    - name: harbor-secret

resources:
  limits:
    memory: "1Gi"
    cpu: "1000m"
  requests:
    memory: "512Mi"
    cpu: "200m"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8787"

probes:
  liveness:
    path: "/api/v1/health"
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  readiness:
    path: "/api/v1/health"
    initialDelaySeconds: 3
    periodSeconds: 3
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1

# Safe to scale horizontally now that crons/workers live on
# cloud-erp-worker (RUN_WORKERS=false here). Off by default; enable when
# traffic warrants.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: false
  minAvailable: 1

# Pre-upgrade DB migration Job. Runs once per `helm upgrade`, before the new
# pods roll, applying base-track migrations to every active tenant + each
# on-activation module track (packaging) to the tenants that have it active.
# A failure blocks the rollout. Not run on first install.
migrate:
  enabled: true
  backoffLimit: 1
  timeoutSeconds: 900
