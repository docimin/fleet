replicaCount: 1

name: cloud-erp-frontend

image:
  repository: harbor.fayevr.dev/fleet/cloud-erp-frontend
  tag: "0.0.17"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 3001

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: app.cloud-erp.dev
      paths:
        # /api routed to the backend Service so the frontend can call
        # same-origin — keeps auth cookies first-party and avoids CORS.
        - path: "/api"
          pathType: Prefix
          service: cloud-erp-backend-service
          port: 80
        - path: "/"
          pathType: Prefix
  tls:
    - hosts:
        - app.cloud-erp.dev
      secretName: cloud-erp-frontend-tls

# ESO pulls runtime env (any Sentry / branding vars) from the configured
# store. Most frontend env is baked at build time via VITE_*, but a few
# runtime-only knobs go here.
externalSecret:
  enabled: true
  refreshInterval: "5m"
  storeRef:
    kind: ClusterSecretStore
    name: vault-cloud-erp
  remoteRef:
    key: vault-cloud-erp/frontend
  targetSecretName: cloud-erp-frontend

secrets:
  name: cloud-erp-frontend
  imagePullSecrets:
    - name: harbor-secret

resources:
  limits:
    memory: "512Mi"
    cpu: "500m"
  requests:
    memory: "128Mi"
    cpu: "100m"

podAnnotations: {}

probes:
  liveness:
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  readiness:
    path: "/"
    initialDelaySeconds: 3
    periodSeconds: 3
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: false
  minAvailable: 1
