{{- /*
  Password is generated once on first install and preserved on upgrades
  via lookup, so it never lives in git. redis-url is the ready-made
  connection string for the backend's REDIS_URL env var.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-auth" .Values.name) }}
{{- $pw := "" }}
{{- if $existing }}
{{- $pw = index $existing.data "password" | b64dec }}
{{- else }}
{{- $pw = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.name }}-auth
type: Opaque
stringData:
  password: {{ $pw | quote }}
  redis-url: {{ printf "redis://default:%s@%s.%s.svc:6379" $pw .Values.name .Release.Namespace | quote }}
