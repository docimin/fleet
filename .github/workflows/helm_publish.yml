name: Publish Helm charts

on:
  workflow_dispatch:
    inputs:
      chart:
        description: "Which chart to package and push (or 'all')"
        required: true
        type: string
        default: all

jobs:
  resolve:
    name: Resolve chart list
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.list.outputs.charts }}
    steps:
      - uses: actions/checkout@v4

      - name: Build chart matrix
        id: list
        run: |
          if [ "${{ inputs.chart }}" = "all" ]; then
            charts=$(find . -mindepth 2 -maxdepth 2 -name 'Chart.yaml' -exec dirname {} \; | sed 's|^\./||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            if [ ! -f "${{ inputs.chart }}/Chart.yaml" ]; then
              echo "::error::No chart found at ${{ inputs.chart }}/Chart.yaml"
              exit 1
            fi
            charts=$(jq -n -c --arg c "${{ inputs.chart }}" '[$c]')
          fi
          echo "charts=$charts" >> "$GITHUB_OUTPUT"
          echo "::notice::Charts to publish: $charts"

  publish:
    name: Publish ${{ matrix.chart }}
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJSON(needs.resolve.outputs.charts) }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Update dependencies
        working-directory: ${{ matrix.chart }}
        run: helm dependency update

      - uses: docker/login-action@v3
        with:
          registry: harbor.fayevr.dev
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Package & push
        run: |
          set -euo pipefail
          helm package "${{ matrix.chart }}" --destination .
          for tgz in "${{ matrix.chart }}"-*.tgz; do
            echo "Pushing $tgz"
            helm push "$tgz" oci://harbor.fayevr.dev/helm
          done
