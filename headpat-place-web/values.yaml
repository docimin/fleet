replicaCount: 1

name: headpat-place-web

image:
  repository: harbor.fayevr.dev/fleet/headpat-place-web
  tag: "0.1.11"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: headpat.place
      paths:
        - path: "/"
          pathType: Prefix
    - host: www.headpat.place
      paths:
        - path: "/"
          pathType: Prefix
  tls:
    - hosts:
        - headpat.place
        - www.headpat.place
      secretName: headpat-place-web-tls-secret

externalSecret:
  enabled: true
  refreshInterval: "1h"
  storeRef:
    kind: ClusterSecretStore
    name: vault-headpat
  remoteRef:
    key: headpat-place/web-env
  targetSecretName: headpat-place-web-env

secrets:
  name: headpat-place-web-env
  imagePullSecrets:
    - name: harbor-secret

resources:
  limits:
    memory: "512Mi"
    cpu: "1000m"
  requests:
    memory: "128Mi"
    cpu: "100m"

probes:
  liveness:
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3

autoscaling:
  enabled: false

pdb:
  enabled: false
