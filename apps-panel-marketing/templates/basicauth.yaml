{{- if .Values.basicAuth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.name }}-basicauth
type: Opaque
stringData:
  users: {{ .Values.basicAuth.users | quote }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Values.name }}-basicauth
spec:
  basicAuth:
    secret: {{ .Values.name }}-basicauth
    realm: {{ .Values.basicAuth.realm | quote }}
    removeHeader: true
{{- end }}
