replicaCount: 1

name: cloud-erp-marketing

image:
  repository: harbor.fayevr.dev/fleet/cloud-erp-marketing
  tag: "0.0.3"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: erpmarketing.headpat.dev
      paths:
        - path: "/"
          pathType: Prefix
  tls:
    - hosts:
        - erpmarketing.headpat.dev
      secretName: cloud-erp-marketing-tls

# Marketing needs no runtime secrets (only PORT). Disabled — and the
# vault-cloud-erp store is not currently healthy. Re-enable if marketing
# ever needs env from Vault.
externalSecret:
  enabled: false
  refreshInterval: "5m"
  storeRef:
    kind: ClusterSecretStore
    name: vault-cloud-erp
  remoteRef:
    key: vault-cloud-erp/marketing
  targetSecretName: cloud-erp-marketing

secrets:
  name: cloud-erp-marketing
  imagePullSecrets:
    - name: harbor-secret

resources:
  limits:
    memory: "512Mi"
    cpu: "500m"
  requests:
    memory: "128Mi"
    cpu: "100m"

podAnnotations: {}

probes:
  liveness:
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  readiness:
    path: "/"
    initialDelaySeconds: 3
    periodSeconds: 3
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: false
  minAvailable: 1
